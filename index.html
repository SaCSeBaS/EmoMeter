<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Emo Meter Input</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <style>
      :root {
        --bg: #09090d;
        --panel: rgba(20, 20, 28, 0.78);
        --panel-border: rgba(255, 255, 255, 0.08);
        --text: #f2edf5;
        --muted: #b3a9ba;
        --accent: #ff4d8d;
        --accent-soft: #7b3cff;
        --shadow: 0 24px 80px rgba(0, 0, 0, 0.55);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Georgia, "Times New Roman", serif;
        color: var(--text);
        background:
          radial-gradient(
            circle at top,
            rgba(123, 60, 255, 0.22),
            transparent 34%
          ),
          radial-gradient(
            circle at 85% 15%,
            rgba(255, 77, 141, 0.18),
            transparent 28%
          ),
          linear-gradient(180deg, #14111d 0%, #09090d 45%, #040406 100%);
        display: grid;
        place-items: center;
        padding: 32px 18px;
        overflow-x: hidden;
      }

      body::before,
      body::after {
        content: "";
        position: fixed;
        inset: auto;
        pointer-events: none;
        z-index: 0;
        filter: blur(6px);
      }

      body::before {
        width: 220px;
        height: 220px;
        top: 8%;
        left: -60px;
        border-radius: 50%;
        background: rgba(255, 77, 141, 0.11);
      }

      body::after {
        width: 260px;
        height: 260px;
        right: -70px;
        bottom: 6%;
        border-radius: 50%;
        background: rgba(123, 60, 255, 0.12);
      }

      .card {
        position: relative;
        z-index: 1;
        width: min(960px, 100%);
        border: 1px solid var(--panel-border);
        background: var(--panel);
        backdrop-filter: blur(16px);
        box-shadow: var(--shadow);
        border-radius: 28px;
        overflow: hidden;
      }

      .hero {
        padding: 42px 28px 28px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        background:
          linear-gradient(135deg, rgba(255, 77, 141, 0.1), transparent 40%),
          linear-gradient(225deg, rgba(123, 60, 255, 0.16), transparent 50%);
      }

      .eyebrow {
        margin: 0 0 10px;
        text-transform: uppercase;
        letter-spacing: 0.26em;
        color: #d0c6d8;
        font-size: 0.72rem;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.8rem, 9vw, 5.6rem);
        line-height: 0.95;
        letter-spacing: 0.02em;
        text-transform: uppercase;
        text-shadow: 0 0 24px rgba(255, 77, 141, 0.22);
      }

      .subtitle {
        max-width: 60ch;
        color: var(--muted);
        font-size: 1.06rem;
        line-height: 1.6;
        margin: 18px 0 0;
      }

      .content {
        display: grid;
      }

      .panel {
        padding: 28px;
      }

      .panel + .panel {
        border-left: 1px solid rgba(255, 255, 255, 0.08);
      }

      .form-shell,
      .info-shell {
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.03);
        border-radius: 22px;
        padding: 24px;
      }

      .field {
        margin-bottom: 16px;
      }

      #inputForm {
        width: 100%;
      }

      label {
        display: block;
        margin-bottom: 8px;
        color: #d8d0df;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-size: 0.74rem;
      }

      input {
        width: 100%;
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(0, 0, 0, 0.28);
        color: var(--text);
        font-size: 1rem;
        padding: 12px 14px;
      }

      input::placeholder {
        color: #9f96a8;
      }

      input:focus {
        outline: none;
        border-color: rgba(255, 77, 141, 0.65);
        box-shadow: 0 0 0 3px rgba(255, 77, 141, 0.14);
      }

      .input-error {
        border-color: rgba(255, 106, 140, 0.9);
        box-shadow: 0 0 0 3px rgba(255, 106, 140, 0.18);
      }

      .error-message {
        margin: 8px 2px 0;
        min-height: 1.2em;
        color: #ff9fbc;
        font-size: 0.86rem;
        line-height: 1.4;
      }

      .submit-btn {
        width: 100%;
        border: 0;
        border-radius: 14px;
        padding: 13px 16px;
        color: #fff5fb;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        background: linear-gradient(135deg, var(--accent), var(--accent-soft));
        box-shadow: 0 16px 30px rgba(123, 60, 255, 0.28);
      }

      .submit-btn:hover {
        filter: brightness(1.06);
      }

      .note {
        margin-top: 12px;
        color: var(--muted);
        font-size: 0.92rem;
        line-height: 1.5;
      }

      .modal {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 16px;
        background: rgba(0, 0, 0, 0.62);
        z-index: 20;
      }

      .modal.is-open {
        display: flex;
      }

      .modal-card {
        width: min(440px, 100%);
        border-radius: 18px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: rgba(20, 20, 28, 0.96);
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.5);
        padding: 20px 18px;
      }

      .modal-title {
        margin: 0 0 8px;
        font-size: 1.2rem;
        color: #8df5c0;
      }

      .modal-text {
        margin: 0;
        color: var(--text);
        line-height: 1.5;
      }

      .modal-actions {
        margin-top: 16px;
        display: flex;
        justify-content: flex-end;
      }

      .modal-btn {
        border: 0;
        border-radius: 12px;
        padding: 10px 16px;
        color: #fff5fb;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        background: linear-gradient(135deg, var(--accent), var(--accent-soft));
      }

      .scale-list {
        margin: 0;
        padding: 0;
        list-style: none;
        display: grid;
        gap: 10px;
      }

      .scale-list li {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 14px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.06);
        color: #eee7f1;
      }

      .scale-list span {
        color: var(--muted);
      }

      @media (max-width: 800px) {
        .content {
          grid-template-columns: 1fr;
        }

        .panel + .panel {
          border-left: 0;
          border-top: 1px solid rgba(255, 255, 255, 0.08);
        }

        .hero,
        .panel {
          padding: 24px 20px;
        }

        .form-shell,
        .info-shell {
          padding: 18px;
        }
      }

      @media (max-width: 620px) {
        body {
          padding: 18px 12px;
        }

        .card {
          border-radius: 22px;
        }

        .hero {
          padding: 22px 18px 20px;
        }

        .eyebrow {
          letter-spacing: 0.18em;
          font-size: 0.66rem;
        }

        h1 {
          font-size: clamp(2.3rem, 15vw, 3.6rem);
        }

        .subtitle {
          font-size: 0.96rem;
          line-height: 1.5;
        }

        .panel {
          padding: 18px;
        }
      }

      @media (max-width: 420px) {
        body {
          padding: 12px 8px;
        }

        .hero,
        .panel {
          padding: 16px;
        }

        .form-shell,
        .info-shell {
          padding: 14px;
        }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <section class="hero">
        <p class="eyebrow">Are you a true emo?</p>
        <h1>Emo Meter</h1>
        <p class="subtitle">
          Share your email and Spotify playlist URL to run your emo check...
        </p>
      </section>

      <section class="content">
        <section class="panel">
          <div class="form-shell">
            <form id="inputForm">
              <div class="field">
                <label for="email">Email</label>
                <input
                  id="email"
                  name="email"
                  type="email"
                  placeholder="you@example.com"
                  required
                />
                <p class="error-message" id="emailError" aria-live="polite"></p>
              </div>
              <div class="field">
                <label for="spotifyUrl">Spotify Playlist URL</label>
                <input
                  id="spotifyUrl"
                  name="spotifyUrl"
                  type="url"
                  placeholder="https://open.spotify.com/playlist/..."
                  required
                />
                <p
                  class="error-message"
                  id="spotifyUrlError"
                  aria-live="polite"
                ></p>
              </div>
              <button class="submit-btn" type="submit">Submit Playlist</button>
            </form>
          </div>
        </section>
      </section>
    </main>

    <div
      class="modal"
      id="successModal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="successModalTitle"
      aria-describedby="successModalText"
    >
      <div class="modal-card">
        <h2 class="modal-title" id="successModalTitle">Submission received</h2>
        <p class="modal-text" id="successModalText"></p>
        <div class="modal-actions">
          <button type="button" class="modal-btn" id="successModalOkButton">
            OK
          </button>
        </div>
      </div>
    </div>

    <script>
      const form = document.getElementById("inputForm");
      const emailInput = document.getElementById("email");
      const spotifyUrlInput = document.getElementById("spotifyUrl");
      const emailError = document.getElementById("emailError");
      const spotifyUrlError = document.getElementById("spotifyUrlError");
      const successModal = document.getElementById("successModal");
      const successModalText = document.getElementById("successModalText");
      const successModalOkButton = document.getElementById(
        "successModalOkButton",
      );

      const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      const spotifyPlaylistPattern =
        /^https:\/\/open\.spotify\.com\/playlist\/[a-zA-Z0-9]+(\?.*)?$/;

      function setFieldError(input, errorElement, message) {
        input.classList.add("input-error");
        errorElement.textContent = message;
      }

      function clearFieldError(input, errorElement) {
        input.classList.remove("input-error");
        errorElement.textContent = "";
      }

      function clearSuccessMessage() {}

      function resetFormAfterSuccess() {
        form.reset();
        clearFieldError(emailInput, emailError);
        clearFieldError(spotifyUrlInput, spotifyUrlError);
        clearSuccessMessage();
      }

      function closeSuccessModal() {
        successModal.classList.remove("is-open");
        resetFormAfterSuccess();
      }

      function openSuccessModal(email) {
        successModalText.textContent =
          "Your playlist is being analyzed. You will receive an email at " +
          email +
          " when it is ready.";
        successModal.classList.add("is-open");
      }

      function validateEmail() {
        const value = emailInput.value.trim();
        if (!value) {
          setFieldError(emailInput, emailError, "Email is required.");
          return false;
        }
        if (!emailPattern.test(value)) {
          setFieldError(
            emailInput,
            emailError,
            "Enter a valid email, for example: you@example.com.",
          );
          return false;
        }
        clearFieldError(emailInput, emailError);
        return true;
      }

      function validateSpotifyUrl() {
        const value = spotifyUrlInput.value.trim();
        if (!value) {
          setFieldError(
            spotifyUrlInput,
            spotifyUrlError,
            "Spotify playlist URL is required.",
          );
          return false;
        }
        if (!spotifyPlaylistPattern.test(value)) {
          setFieldError(
            spotifyUrlInput,
            spotifyUrlError,
            "Use a valid Spotify playlist URL from https://open.spotify.com/playlist/...",
          );
          return false;
        }
        clearFieldError(spotifyUrlInput, spotifyUrlError);
        return true;
      }

      emailInput.addEventListener("input", validateEmail);
      spotifyUrlInput.addEventListener("input", validateSpotifyUrl);
      emailInput.addEventListener("input", clearSuccessMessage);
      spotifyUrlInput.addEventListener("input", clearSuccessMessage);
      successModalOkButton.addEventListener("click", closeSuccessModal);

      successModal.addEventListener("click", (event) => {
        if (event.target === successModal) {
          closeSuccessModal();
        }
      });

      form.addEventListener("submit", (event) => {
        event.preventDefault();

        const isEmailValid = validateEmail();
        const isSpotifyUrlValid = validateSpotifyUrl();

        if (!isEmailValid || !isSpotifyUrlValid) {
          clearSuccessMessage();
          return;
        }

        const email = emailInput.value.trim();
        const spotifyUrl = spotifyUrlInput.value.trim();

        const targetUrl = new URL(
          "http://127.0.0.1:5678/webhook-test/form-input",
        );
        targetUrl.searchParams.set("email", email);
        targetUrl.searchParams.set("spotify_url", spotifyUrl);

        openSuccessModal(email);

        window.open(targetUrl.toString(), "_blank");
      });
    </script>
  </body>
</html>
